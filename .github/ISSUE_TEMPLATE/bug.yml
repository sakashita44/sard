name: バグ報告
description: 期待と異なる挙動の報告
labels: ["bug"]
body:
    - type: textarea
      id: behavior
      attributes:
          label: 現状の挙動
      validations:
          required: true
    - type: textarea
      id: expected
      attributes:
          label: 期待する挙動
      validations:
          required: true
    - type: textarea
      id: reproduce
      attributes:
          label: 再現手順
      validations:
          required: false
